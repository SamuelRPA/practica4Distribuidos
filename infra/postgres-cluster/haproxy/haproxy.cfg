# HAProxy para el cluster Postgres
# - Puerto 5433: enruta a cualquier standby (lecturas del dashboard)
# Las escrituras van directo a pg_primary:5432 desde la app — más simple para
# defenderlo en clase. Si quieres balanceo de escrituras, agrega un frontend
# adicional con un check `pg_is_in_recovery() = false`.

global
    maxconn 200
    log stdout format raw local0

defaults
    mode tcp
    log global
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    option tcplog

# Stats UI
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s

# Lecturas → standbys (round-robin)
listen postgres_read
    bind *:5433
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect port 5432
    server pg_standby_1 pg_standby_1:5432 check inter 5s rise 2 fall 3
    server pg_standby_2 pg_standby_2:5432 check inter 5s rise 2 fall 3
