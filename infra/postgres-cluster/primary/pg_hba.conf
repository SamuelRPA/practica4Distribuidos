# pg_hba.conf — autenticación de host
# Permite conexiones de la app y de los standbys.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    all             all             127.0.0.1/32            md5
host    all             all             ::1/128                 md5

# App backend (red docker)
host    all             all             0.0.0.0/0               md5
host    all             all             ::/0                    md5

# Replicación: los standbys se conectan como 'replicator'
host    replication     replicator      0.0.0.0/0               md5
host    replication     replicator      ::/0                    md5
