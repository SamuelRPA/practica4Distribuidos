# Configuración del PRIMARY para streaming replication
# Optimizada para un entorno de práctica académica.

listen_addresses = '*'
port = 5432
max_connections = 100

# Replicación
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
synchronous_commit = on
wal_keep_size = 1024MB

# Logging
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_connections = off
log_disconnections = off

# Performance básica
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 64MB

# Checkpoint
checkpoint_timeout = 5min
max_wal_size = 1GB
min_wal_size = 80MB
